{% extends 'base.html' %}

{% block title %}Login | LifeLine Link{% endblock %}

{% block extra_css %}
<style>
    /* Page Background Overrides */
    body {
        background-color: var(--bg-section); /* Soft gray background #F8F9FA */
    }

    .login-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 4rem 0;
    }

    .login-card {
        max-width: 480px;
        width: 100%;
        padding: 3rem;
        background-color: white;
        border-radius: 16px;
        box-shadow: var(--shadow-subtle);
        border: 1px solid var(--border-subtle);
    }

    .form-header {
        text-align: center;
        margin-bottom: 2.5rem;
    }

    .form-header i {
        color: var(--primary);
        font-size: 2.5rem;
        margin-bottom: 1rem;
        display: inline-block;
    }

    .form-title {
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--secondary); /* Deep Blue */
        margin-bottom: 0.5rem;
    }

    .form-subtitle {
        color: var(--text-body);
        font-size: 0.95rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
        text-align: left;
    }

    .form-group label {
        display: block;
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: var(--text-heading);
    }

    .form-control {
        width: 100%;
        background-color: white;
        border: 1.5px solid var(--border-subtle);
        border-radius: 8px;
        padding: 0.8rem 1rem;
        color: var(--text-heading);
        font-family: var(--font-body);
        font-size: 1rem;
        transition: var(--transition);
    }

    .form-control:focus {
        outline: none;
        border-color: var(--secondary);
        box-shadow: 0 0 0 3px rgba(2, 62, 138, 0.1);
    }

    .btn-submit {
        background-color: var(--primary);
        color: white;
        border: none;
        width: 100%;
        padding: 0.9rem;
        border-radius: 50px; /* rounded-pill */
        font-size: 1.05rem;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
        margin-top: 1rem;
        box-shadow: 0 4px 12px rgba(214, 40, 40, 0.25);
        font-family: var(--font-headings);
    }

    .btn-submit:hover {
        background-color: var(--primary-hover);
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(214, 40, 40, 0.35);
    }

    .register-link {
        text-align: center;
        margin-top: 2rem;
        font-size: 0.95rem;
        color: var(--text-body);
    }

    .register-link a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
        transition: var(--transition);
    }

    .register-link a:hover {
        color: var(--primary-hover);
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="form-header">
            <i class="fa-solid fa-heart-pulse"></i>
            <h1 class="form-title">Welcome Back</h1>
            <p class="form-subtitle">Access your LifeLine Link medical finder portal</p>
        </div>
        
        <form method="POST" action="{{ url_for('login') }}">
            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-submit"><i class="fa-solid fa-right-to-bracket"></i> Login Account</button>
        </form>

        <div class="register-link">
            Don't have an account? <a href="{{ url_for('register') }}">Create one here</a>
        </div>
    </div>
</div>
{% endblock %}
